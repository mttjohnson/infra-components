---
- name: Query GitHub for the latest tenv release
  ansible.builtin.uri:
    url: "{{ tenv_github_api_url }}"
    return_content: true
    headers:
      Accept: "application/vnd.github+json"
  register: _tenv_latest_release
  check_mode: false
  changed_when: false

- name: Set resolved tenv version from GitHub release
  ansible.builtin.set_fact:
    _tenv_resolved_version: "{{ _tenv_latest_release.json.tag_name | regex_replace('^v', '') }}"

- name: Latest version info from GitHub
  ansible.builtin.debug:
    msg: |
      _tenv_resolved_version: {{ _tenv_resolved_version }}
