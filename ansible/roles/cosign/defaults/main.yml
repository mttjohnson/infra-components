---
# Version of cosign to install. Set to "latest" to query the GitHub API.
cosign_version: "3.0.6"

# Desired state: "present" or "absent".
cosign_state: "present"

# Verification mode applied to the downloaded .deb before installation:
#   bundle        - Bootstrap a verified cosign binary, then use cosign verify-blob
#                   against the .sigstore.json bundle published with the release.
#                   Strongest option (cert chain + transparency log + signed timestamp).
#   checksum_only - Verify the .deb SHA256 against cosign_checksums.txt only.
#                   Provides integrity but not authenticity.
#   none          - No verification beyond TLS to GitHub. Not recommended.
cosign_verify: "bundle"

# Sigstore certificate identity the .deb bundle's signing certificate must
# match. Cosign releases are signed by the Sigstore project's GCP service
# account (verified via Google OIDC), per the official Sigstore docs:
# https://docs.sigstore.dev/cosign/system_config/installation/
#
# Provide either an exact identity OR a regex, but not both. If both are set,
# cosign_cert_identity (exact) takes precedence.
cosign_cert_identity: "keyless@projectsigstore.iam.gserviceaccount.com"
cosign_cert_identity_regexp: ""

# OIDC issuer for the signing identity. Google for upstream cosign releases.
cosign_cert_oidc_issuer: "https://accounts.google.com"

# Where bootstrap downloads are staged. Cleaned up after install.
cosign_cache_dir: "/var/cache/ansible-cosign"

# URL bases. Override for mirrors or air-gapped installs.
cosign_download_base_url: "https://github.com/sigstore/cosign/releases/download"
cosign_github_api_url: "https://api.github.com/repos/sigstore/cosign/releases/latest"
