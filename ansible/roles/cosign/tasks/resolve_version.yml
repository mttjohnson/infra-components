---
- name: Query GitHub for the latest cosign release
  ansible.builtin.uri:
    url: "{{ cosign_github_api_url }}"
    return_content: true
    headers:
      Accept: "application/vnd.github+json"
  register: _cosign_latest_release
  check_mode: false
  changed_when: false

- name: Set resolved cosign version from GitHub release
  ansible.builtin.set_fact:
    _cosign_resolved_version: "{{ _cosign_latest_release.json.tag_name | regex_replace('^v', '') }}"

- name: Latest Version Info From GitHub
  ansible.builtin.debug:
    msg: |
      _cosign_resolved_version: {{ _cosign_resolved_version }}
