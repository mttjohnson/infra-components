---
# Map ansible architecture facts to Go architecture names used by node_exporter release filenames
_node_exporter_arch_map:
  i386: "386"
  x86_64: amd64
  aarch64: arm64
  armv7l: armv7
  armv6l: armv6

_node_exporter_go_arch: "{{ node_exporter_go_arch | default(_node_exporter_arch_map[ansible_facts['architecture']] | default(ansible_facts['architecture'])) }}"
